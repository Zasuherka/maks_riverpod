name: CD — Build Release APK

on:
  # workflow_run — триггер который слушает другой воркфлоу
  # CD запустится автоматически ТОЛЬКО когда CI ("CI — Analyze & Test") завершился успешно
  # Это заменяет дублирование CI-шагов внутри этого файла
  workflow_run:
    workflows: ["CI — Analyze & Test"]   # имя должно точно совпадать с name: в ci.yml
    types: [completed]                   # реагируем на завершение (успех или провал)
    branches: [main]                     # только для ветки main

  # Ручной запуск остаётся — иногда нужно собрать билд без пуша
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия сборки (например: 1.0.1)'
        required: false
        default: ''

permissions:
  contents: read

# Принудительно используем Node.js 24 для всех actions в этом воркфлоу
# Node.js 20 объявлен deprecated и будет удалён с раннеров 16 сентября 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    # Условие: если воркфлоу запущен через workflow_run — проверяем что CI прошёл успешно
    # Если запущен вручную (workflow_dispatch) — условие не нужно, пускаем всегда
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # Декодируем keystore из Base64
      # KEYSTORE_BASE64 — наш .jks файл, закодированный в Base64 и сохранённый в GitHub Secrets
      # Бинарные файлы нельзя хранить в Secrets напрямую — только строки,
      # поэтому кодируем файл → строка в Secrets → декодируем обратно в файл на CI
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Создаём key.properties из GitHub Secrets
      # Этот файл нужен build.gradle.kts для подписи APK
      # Все чувствительные данные приходят из Secrets — не из кода
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # Устанавливаем версию если передана вручную через workflow_dispatch
      # Если не передана — используем версию из pubspec.yaml
      - name: Set version
        if: ${{ github.event.inputs.version != '' }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version:.*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml

      # Собираем release APK
      # --obfuscate и --split-debug-info — скрывают имена классов от реверс-инжиниринга
      - name: Build Release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      # Переименовываем APK с номером сборки чтобы различать билды
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/maks_riverpod-release-${{ github.run_number }}.apk

      # Загружаем APK как артефакт — скачать можно в Actions → Summary
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maks_riverpod-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/maks_riverpod-release-${{ github.run_number }}.apk
          retention-days: 30

      # Debug symbols нужны для расшифровки стек-трейсов из crash-репортов
      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ github.run_number }}
          path: build/debug-info/
          retention-days: 30
